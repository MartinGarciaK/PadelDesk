<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Padel Bot — Lasaigues</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111b21;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 420px;
      height: 700px;
      background: #0b141a;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .header {
      background: #202c33;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #00a884;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .header-info h2 {
      color: #e9edef;
      font-size: 16px;
      font-weight: 500;
    }

    .header-info span {
      color: #8696a0;
      font-size: 13px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: #374045; border-radius: 2px; }

    .bubble {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .bubble.bot {
      background: #202c33;
      color: #e9edef;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .bubble.user {
      background: #005c4b;
      color: #e9edef;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .bubble.sistema {
      background: #1a3a2a;
      color: #00a884;
      align-self: center;
      font-size: 12px;
      border-radius: 8px;
      text-align: center;
    }

    .bubble .hora {
      font-size: 11px;
      color: #8696a0;
      margin-top: 4px;
      text-align: right;
    }

    .typing {
      display: flex;
      gap: 4px;
      padding: 12px 14px;
      background: #202c33;
      border-radius: 12px;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
    }

    .typing span {
      width: 8px;
      height: 8px;
      background: #8696a0;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .input-area {
      background: #202c33;
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    input[type="text"] {
      flex: 1;
      background: #2a3942;
      border: none;
      border-radius: 24px;
      padding: 10px 18px;
      color: #e9edef;
      font-size: 15px;
      outline: none;
    }

    input[type="text"]::placeholder { color: #8696a0; }

    button.send {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #00a884;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    button.send:hover { background: #06cf9c; }

    button.send svg {
      width: 20px;
      height: 20px;
      fill: white;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="avatar">🎾</div>
    <div class="header-info">
      <h2>Lasaigues Padel</h2>
      <span id="estado">en línea</span>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input type="text" id="input" placeholder="Escribí un mensaje..." autocomplete="off"/>
    <button class="send" onclick="enviar()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  const API = "http://127.0.0.1:8000";
  let historial = [];

  function horaActual() {
    return new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
  }

  function agregarBurbuja(texto, tipo) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `bubble ${tipo}`;
    div.innerHTML = `${texto}<div class="hora">${horaActual()}</div>`;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function mostrarTyping() {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function quitarTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function enviar() {
    const input = document.getElementById('input');
    const mensaje = input.value.trim();
    if (!mensaje) return;

    input.value = '';
    input.disabled = true;

    agregarBurbuja(mensaje, 'user');
    historial.push({ role: 'user', content: mensaje });

    mostrarTyping();

    try {
      const res = await fetch(`${API}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mensaje, historial: historial.slice(0, -1) })
      });

      const data = await res.json();
      quitarTyping();

      agregarBurbuja(data.respuesta, 'bot');
      historial.push({ role: 'assistant', content: data.respuesta });

      if (data.reserva_creada) {
        const r = data.datos_reserva;
        agregarBurbuja(
          `Reserva confirmada para ${r.nombre} el ${r.fecha} a las ${r.hora}`,
          'sistema'
        );
        historial = [];
      }

    } catch (e) {
      quitarTyping();
      agregarBurbuja('Error conectando con el servidor. ¿Está corriendo el backend?', 'sistema');
    }

    input.disabled = false;
    input.focus();
  }

  document.getElementById('input').addEventListener('keydown', e => {
    if (e.key === 'Enter') enviar();
  });

  window.onload = async () => {
    try {
      const res = await fetch(`${API}/`);
      const data = await res.json();
      document.getElementById('estado').textContent =
        data.ollama === 'conectado' ? 'en línea' : 'Ollama desconectado';
      agregarBurbuja('Hola! Soy el asistente de Lasaigues Padel. ¿En qué te puedo ayudar?', 'bot');
    } catch {
      agregarBurbuja('No se puede conectar con el servidor.', 'sistema');
    }
  };
</script>
</body>
</html>
